<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meeting availability — results</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Availability results</h1>
    <p class="sub">
      Live overlap heatmap for a meeting issue, shown in <em>your</em> timezone.
      Reads the public GitHub issue's comments directly — nothing is stored.
      <a href="./">← back to the painter</a>
    </p>

    <section class="controls">
      <label>
        Repo (owner/name)
        <input id="repo" type="text" placeholder="octocat/meeting-times" />
      </label>
      <label>
        Issue #
        <input id="issue" type="text" placeholder="42" inputmode="numeric" />
      </label>
      <label>
        View in timezone
        <select id="viewer-tz"></select>
      </label>
      <div class="bulk"><button type="button" id="load">Load</button></div>
    </section>

    <p id="viewer-tz-note" class="tz-note"></p>
    <p id="status" class="hint"></p>

    <div id="responders"></div>
    <div id="heatmap-wrap"></div>
    <div id="plan"></div>
  </main>
  <script src="results.js"></script>
</body>
</html>
